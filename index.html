<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MTG Cube Manager</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; color: #fff; font-family: 'Courier New', monospace; }
    #root { min-height: 100vh; }
    #loading {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; color: #555; font-size: 13px;
      font-family: 'Courier New', monospace; letter-spacing: 0.1em;
    }
  </style>
</head>
<body>
  <div id="root"><div id="loading">LOADING...</div></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script>
    fetch('./cube-app.jsx')
      .then(r => r.text())
      .then(src => {
        let transformed;
        try {
          transformed = Babel.transform(src, {
            presets: ['react'],
            plugins: []
          }).code;
        } catch(babelErr) {
          document.getElementById('root').innerHTML =
            '<div style="padding:40px;color:#d94a4a;font-family:monospace;white-space:pre-wrap">BABEL ERROR:\n' + babelErr.message + '\n\n' + (babelErr.stack||'') + '</div>';
          return;
        }
        try {
          const fn = new Function('React', 'ReactDOM', transformed + '\nReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));');
          fn(React, ReactDOM);
        } catch(runtimeErr) {
          document.getElementById('root').innerHTML =
            '<div style="padding:40px;color:#d94a4a;font-family:monospace;white-space:pre-wrap">RUNTIME ERROR:\n' + runtimeErr.message + '\n\n' + (runtimeErr.stack||'') + '</div>';
        }
      })
      .catch(err => {
        document.getElementById('root').innerHTML =
          '<div style="padding:40px;color:#d94a4a;font-family:monospace;white-space:pre-wrap">LOAD ERROR:\n' + err.message + '</div>';
      });
  </script>
</body>
</html>
