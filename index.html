<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MTG Cube Manager</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; color: #fff; font-family: 'Courier New', monospace; }
    #root { min-height: 100vh; }
    #loading { display: flex; align-items: center; justify-content: center; min-height: 100vh; color: #555; font-size: 13px; }
  </style>
</head>
<body>
  <div id="root"><div id="loading">LOADING...</div></div>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.9/babel.min.js"></script>
  <script>
    fetch('./cube-app.jsx')
      .then(r => r.text())
      .then(src => {
        const transformed = Babel.transform(src, { presets: ['react'] }).code;
        // Find any "import" in transformed code
        const lines = transformed.split('\n');
        const importLines = [];
        lines.forEach((l, i) => {
          if (l.includes('import')) importLines.push((i+1) + ': ' + l.trim().slice(0,120));
        });
        document.getElementById('root').innerHTML =
          '<div style="padding:20px;color:#fff;font-family:monospace;font-size:11px;white-space:pre-wrap">IMPORT LINES IN TRANSFORMED CODE:\n' + importLines.join('\n') + '</div>';
      });
  </script>
</body>
</html>
